name: Validate Source Code

on:
  workflow_call:
    inputs:
      actions-repo:
        description: 'Repository with remote actions'
        type: string
        default: 'nubificus/vaccel'
      actions-ref:
        description: 'Branch, tag or SHA of remote actions repository'
        type: string
        default: 'main'
      runner:
        description: 'JSON array of runner name parts (excluding architecture)'
        type: string
        default: '["base", "dind", "2204"]'
      runner-archs:
        description: 'JSON array of runner architectures to run on'
        type: string
        default: '["amd64"]'
      runner-arch-map:
        description: 'JSON object mapping runner to GNU architectures'
        type: string
        default: '[{"amd64":"x86_64", "arm64":"aarch64", "arm":"armv7l"}]'
      options:
        description: 'Comma-separated list of build options'
        type: string
        default: 'auto_features=enabled'
    secrets:
      VACCEL_BOT_PRIVATE_KEY:
        required: false
      AWS_ACCESS_KEY:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

permissions: read-all

jobs:
  linter-golangci:
    name: Lint Go
    runs-on: >-
      ${{ format('{0}-{1}', join(fromJSON(inputs.runner), '-'), matrix.arch) }}
    strategy:
      matrix:
        arch: ["${{ fromJSON(inputs.runner-archs) }}"]
      fail-fast: false
    env:
      ARCH: ${{ fromJson(inputs.runner-arch-map)[0][matrix.arch] }}
      DOWNLOAD_PATH: >-
        ${{ format('{0}/artifacts/downloads/{1}', github.workspace,
          fromJson(inputs.runner-arch-map)[0][matrix.arch]) }}
    steps:
      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-contents: read

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ inputs.actions-ref }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        id: initialize-workspace
        uses: ./.github/actions/initialize-workspace
        with:
          fetch-depth: 0
          remote-actions-repo: ${{ inputs.actions-repo }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Download artifacts from s3
        id: download-artifacts
        uses: ./.github/actions/download-from-s3
        with:
          ref: >-
            ${{ steps.initialize-workspace.outputs.remote-tag ||
              steps.initialize-workspace.outputs.remote-branch }}
          arch: ${{ env.ARCH }}
          access-key: ${{ secrets.AWS_ACCESS_KEY }}
          secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          local-path: ${{ env.DOWNLOAD_PATH }}
          install: 'true'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

      - name: Clean-up
        if: always()
        env:
          INSTALLED: ${{ steps.download-artifacts.outputs.installed }}
        run: sudo apt-get purge -y "$INSTALLED" || true
        shell: bash

  linter-super-linter:
    name: Lint Shell/Dockerfiles/GHActions/Markdown/YAML
    runs-on: >-
      ${{ format('{0}-{1}', join(fromJSON(inputs.runner), '-'), matrix.arch) }}
    strategy:
      matrix:
        arch: ["${{ fromJSON(inputs.runner-archs) }}"]
      fail-fast: false
    env:
      ARCH: ${{ fromJson(inputs.runner-arch-map)[0][matrix.arch] }}
      DOWNLOAD_PATH: >-
        ${{ format('{0}/artifacts/downloads/{1}', github.workspace,
          fromJson(inputs.runner-arch-map)[0][matrix.arch]) }}
    steps:
      - name: Parse repository names
        id: parse-repos
        env:
          ACTIONS_REPO: ${{ inputs.actions-repo }}
        run: |
          {
            echo "repo-name=$(basename "$GITHUB_REPOSITORY")"
            echo "actions-repo-name=$(basename "$ACTIONS_REPO")"
          } >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate initialization vaccel-bot token
        id: generate-init-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          repositories: |
            ${{ steps.parse-repos.outputs.repo-name }}
            ${{ steps.parse-repos.outputs.actions-repo-name }}
          permission-contents: read

      - name: Checkout .github directory
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github
          repository: ${{ inputs.actions-repo }}
          ref: ${{ inputs.actions-ref }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Initialize workspace
        id: initialize-workspace
        uses: ./.github/actions/initialize-workspace
        with:
          fetch-depth: 0
          remote-actions-repo: ${{ inputs.actions-repo }}
          token: ${{ steps.generate-init-token.outputs.token || github.token }}

      - name: Download artifacts from s3
        id: download-artifacts
        uses: ./.github/actions/download-from-s3
        with:
          ref: >-
            ${{ steps.initialize-workspace.outputs.remote-tag ||
              steps.initialize-workspace.outputs.remote-branch }}
          arch: ${{ env.ARCH }}
          access-key: ${{ secrets.AWS_ACCESS_KEY }}
          secret-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          local-path: ${{ env.DOWNLOAD_PATH }}
          install: 'true'

      - name: Generate linter vaccel-bot token
        id: generate-linter-token
        if: vars.VACCEL_BOT_CLIENT_ID
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.VACCEL_BOT_CLIENT_ID }}
          private-key: ${{ secrets.VACCEL_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-packages: read
          permission-statuses: write

      - name: Run super-linter
        uses: super-linter/super-linter/slim@v8
        env:
          GITHUB_TOKEN: >-
            ${{ steps.generate-linter-token.outputs.token || github.token }}
          ENABLE_GITHUB_PULL_REQUEST_SUMMARY_COMMENT: false
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_BASH: true
          VALIDATE_SHELL_SHFMT: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_MARKDOWN: true
          VALIDATE_YAML: true

      - name: Clean-up
        if: always()
        env:
          INSTALLED: ${{ steps.download-artifacts.outputs.installed }}
        run: sudo apt-get purge -y "$INSTALLED" || true
        shell: bash
