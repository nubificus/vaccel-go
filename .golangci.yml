version: "2"
run:
  issues-exit-code: 1
linters:
  enable:
    - gocritic
    - gosec
    - misspell
    - revive
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
    rules:
      # Skip path traversal check for examples - arbitrary files may be opened
      - path-except: 'examples/*/*.go'
        linters:
          - gosec
        text: "G703"
issues:
  uniq-by-line: false
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
